stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  REGISTRY: $CI_REGISTRY
  IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend

# ─── TEST ────────────────────────────────────────────────────────────────────

test:backend:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r backend/requirements.txt aiosqlite
  script:
    - cd backend
    - python -m pytest tests/ -v --tb=short --no-header
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    when: always

# ─── BUILD ───────────────────────────────────────────────────────────────────

build:backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_BACKEND:$CI_COMMIT_SHA -t $IMAGE_BACKEND:latest ./backend
    - docker push $IMAGE_BACKEND:$CI_COMMIT_SHA
    - docker push $IMAGE_BACKEND:latest
  only:
    - main
    - tags

build:frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
        --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
        --build-arg NEXT_PUBLIC_WS_URL=$NEXT_PUBLIC_WS_URL
        -t $IMAGE_FRONTEND:$CI_COMMIT_SHA
        -t $IMAGE_FRONTEND:latest
        ./frontend
    - docker push $IMAGE_FRONTEND:$CI_COMMIT_SHA
    - docker push $IMAGE_FRONTEND:latest
  only:
    - main
    - tags

# ─── DEPLOY ──────────────────────────────────────────────────────────────────

deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd /opt/sentinel &&
        docker compose pull &&
        docker compose up -d --remove-orphans &&
        docker image prune -f"
  environment:
    name: production
    url: https://$DEPLOY_HOST
  only:
    - main
  when: manual
